<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Blue Gecko · Open House Admin</title>
  <style>
    :root {
      --brand: #1f5c4d;
      --accent: #c96f4a;
      --bg: #f7f6f2;
      --text: #1e2a26;
      --text-soft: #5a6b65;
      --radius: 12px;
      --border: #d0cdc5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }

    header {
      background: var(--brand);
      color: white;
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header h1 { font-size: 1.1rem; font-weight: 700; }
    header span { opacity: 0.7; font-size: 0.85rem; }

    .sync-btn {
      margin-left: auto;
      background: white;
      color: var(--brand);
      border: none;
      border-radius: 999px;
      padding: 0.45rem 1.1rem;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .sync-btn:hover { opacity: 0.85; }
    .sync-btn:disabled { opacity: 0.5; cursor: default; }

    #sync-status {
      font-size: 0.82rem;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      padding: 0 1.5rem;
      background: white;
    }

    .tab-btn {
      padding: 0.85rem 1.5rem;
      border: none;
      background: none;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-soft);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    .panel { display: none; padding: 1.5rem; max-width: 900px; margin: 0 auto; }
    .panel.active { display: block; }

    /* ── Tables ── */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }

    .data-table th {
      background: #f0ede7;
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-soft);
    }

    .data-table td {
      padding: 0.7rem 1rem;
      border-top: 1px solid #eae8e3;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .data-table tr:hover td { background: #faf9f6; }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.1rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 700;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary { background: var(--brand); color: white; }
    .btn-accent { background: var(--accent); color: white; }
    .btn-ghost { background: transparent; color: var(--brand); border: 1.5px solid var(--brand); }
    .btn-danger { background: transparent; color: #b91c1c; border: 1.5px solid #b91c1c; }
    .btn-danger:hover { background: #fee2e2; opacity: 1; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.78rem; }
    .btn-icon { padding: 0.3rem 0.55rem; font-size: 0.9rem; line-height: 1; }

    /* ── Forms ── */
    .form-card {
      background: white;
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }

    .form-card h2 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
      color: var(--brand);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .form-grid .full { grid-column: 1 / -1; }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-soft);
    }

    input, select, textarea {
      padding: 0.55rem 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      background: white;
      color: var(--text);
      width: 100%;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--brand);
    }

    textarea { resize: vertical; }

    .form-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.25rem;
      align-items: center;
    }

    .status {
      font-size: 0.85rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
    }

    .status.ok { background: #d1fae5; color: #065f46; }
    .status.err { background: #fee2e2; color: #991b1b; }
    .status.loading { background: #e0f2fe; color: #0c4a6e; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-header h2 { font-size: 1rem; color: var(--text-soft); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

    /* ── Gallery preview ── */
    .upload-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .gallery-thumb {
      position: relative;
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .gallery-thumb img {
      height: 80px;
      width: 80px;
      object-fit: cover;
      border-radius: 6px;
      border: 1.5px solid var(--border);
      display: block;
      transition: opacity 0.2s;
    }

    .gallery-thumb.removed img {
      opacity: 0.25;
      filter: grayscale(1);
    }

    .gallery-thumb .thumb-label {
      font-size: 0.65rem;
      color: var(--text-soft);
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
    }

    .gallery-thumb .thumb-label.removed-label {
      color: #b91c1c;
      text-decoration: line-through;
    }

    .gallery-thumb .remove-btn {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #b91c1c;
      color: white;
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .gallery-thumb .remove-btn:hover { background: #991b1b; }

    .gallery-thumb .undo-btn {
      font-size: 0.65rem;
      color: var(--brand);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
    }

    .gallery-hint {
      font-size: 0.75rem;
      color: var(--text-soft);
      margin-top: 0.25rem;
      font-weight: 400;
    }

    .replace-all-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-soft);
      font-weight: 400;
    }

    .replace-all-row input[type=checkbox] {
      width: auto;
      accent-color: var(--accent);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>Blue Gecko · Open House Admin</h1>
  <span>Saves commit directly to GitHub</span>
  <span id="sync-status" class="hidden"></span>
  <button class="sync-btn" id="btn-sync-all">↑ Sync all to GitHub</button>
</header>

<div class="tabs">
  <button class="tab-btn active" data-tab="properties">Properties</button>
  <button class="tab-btn" data-tab="events">Events</button>
</div>

<!-- ── PROPERTIES PANEL ────────────────────────────────────────────────── -->
<div class="panel active" id="panel-properties">

  <div class="section-header" style="margin-top:1.25rem;">
    <h2>Properties</h2>
    <button class="btn btn-primary" id="btn-add-property">+ Add property</button>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Address</th>
        <th>Slug</th>
        <th style="width:160px;"></th>
      </tr>
    </thead>
    <tbody id="prop-tbody">
      <tr><td colspan="3" style="color:var(--text-soft);font-style:italic;">Loading…</td></tr>
    </tbody>
  </table>

  <div class="form-card hidden" id="prop-form-wrap">
    <h2 id="prop-form-title">Add property</h2>
    <form id="prop-form">
      <input type="hidden" id="prop-slug-original" />
      <input type="hidden" id="f-hero-existing" />
      <input type="hidden" id="f-gallery-existing" />
      <div class="form-grid">
        <label class="full">
          Address
          <input type="text" id="f-address" placeholder="5017 Barr St, Palm Bay, FL 32907" required />
        </label>
        <label>
          Price ($)
          <input type="number" id="f-price" placeholder="289900" required />
        </label>
        <label>
          Sq ft
          <input type="number" id="f-sqft" placeholder="1612" required />
        </label>
        <label>
          Beds
          <input type="number" id="f-beds" step="0.5" placeholder="3" required />
        </label>
        <label>
          Baths
          <input type="number" id="f-baths" step="0.5" placeholder="2" required />
        </label>
        <label class="full">
          Description
          <textarea id="f-desc" rows="5" required placeholder="Write a natural, honest description of the home…"></textarea>
        </label>

        <label class="full">
          Hero image
          <div class="upload-preview" id="hero-preview"></div>
          <input type="file" id="f-hero" accept="image/*" />
        </label>

        <label class="full">
          Gallery images
          <div class="upload-preview" id="gallery-preview"></div>
          <div class="replace-all-row">
            <input type="checkbox" id="f-replace-all-gallery" />
            <span>Replace all existing gallery images with new uploads</span>
          </div>
          <input type="file" id="f-gallery" accept="image/*" multiple style="margin-top:0.5rem;" />
          <span class="gallery-hint" id="gallery-hint"></span>
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save property</button>
        <button type="button" class="btn btn-ghost" id="btn-cancel-prop">Cancel</button>
        <span class="status hidden" id="prop-status"></span>
      </div>
    </form>
  </div>

</div>

<!-- ── EVENTS PANEL ────────────────────────────────────────────────────── -->
<div class="panel" id="panel-events">

  <div class="section-header" style="margin-top:1.25rem;">
    <h2>Events</h2>
    <button class="btn btn-primary" id="btn-add-event">+ Add event</button>
  </div>

  <table class="data-table">
    <thead>
      <tr>
        <th>Property</th>
        <th>Date</th>
        <th>Time</th>
        <th style="width:180px;"></th>
      </tr>
    </thead>
    <tbody id="event-tbody">
      <tr><td colspan="4" style="color:var(--text-soft);font-style:italic;">Loading…</td></tr>
    </tbody>
  </table>

  <div class="form-card hidden" id="event-form-wrap">
    <h2 id="event-form-title">Add event</h2>
    <form id="event-form">
      <input type="hidden" id="event-id-original" />
      <div class="form-grid">
        <label class="full">
          Property
          <select id="f-property" required>
            <option value="">— select a property —</option>
          </select>
        </label>
        <label>
          Date
          <input type="date" id="f-date" required />
        </label>
        <label style="visibility:hidden;" aria-hidden="true"></label>
        <label>
          Start time
          <input type="time" id="f-start" required />
        </label>
        <label>
          End time
          <input type="time" id="f-end" required />
        </label>
        <label class="full">
          Notes (optional — shown before property description)
          <textarea id="f-notes" rows="3" placeholder="Light refreshments provided. Both agents will be on site."></textarea>
        </label>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save event</button>
        <button type="button" class="btn btn-ghost" id="btn-cancel-event">Cancel</button>
        <span class="status hidden" id="event-status"></span>
      </div>
    </form>
  </div>

</div>

<script>
  // ── Tab switching ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showStatus(el, msg, type) {
    el.textContent = msg;
    el.className = 'status ' + type;
    el.classList.remove('hidden');
    if (type === 'ok') setTimeout(() => el.classList.add('hidden'), 4000);
  }

  function toSlug(address) {
    return address.toLowerCase()
      .replace(/,?\s+(fl|florida)\s*\d*/gi, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '')
      .slice(0, 60);
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadFile(slug, file) {
    const data = await fileToBase64(file);
    const res = await fetch('/api/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ slug, filename: file.name, data, contentType: file.type }),
    });
    const json = await res.json();
    if (!json.ok) throw new Error(json.error || 'Upload failed');
    return json.path;
  }

  // ── Gallery removal state (cleared when form opens) ───────────────────────
  let galleryRemovals = new Set();

  function buildGalleryPreview(paths, slug) {
    galleryRemovals = new Set();
    const container = document.getElementById('gallery-preview');
    container.innerHTML = '';
    if (!paths || paths.length === 0) return;

    for (const src of paths) {
      const fname = src.split('/').pop();
      const wrapper = document.createElement('div');
      wrapper.className = 'gallery-thumb';
      wrapper.dataset.path = src;

      const img = document.createElement('img');
      img.src = src;
      img.title = fname;
      img.onerror = () => { img.style.background = '#eee'; img.alt = fname; };

      const label = document.createElement('span');
      label.className = 'thumb-label';
      label.textContent = fname;

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'remove-btn';
      removeBtn.title = 'Remove this image';
      removeBtn.textContent = '×';

      const undoBtn = document.createElement('button');
      undoBtn.type = 'button';
      undoBtn.className = 'undo-btn hidden';
      undoBtn.textContent = 'Undo';

      removeBtn.addEventListener('click', () => {
        galleryRemovals.add(src);
        wrapper.classList.add('removed');
        label.classList.add('removed-label');
        removeBtn.classList.add('hidden');
        undoBtn.classList.remove('hidden');
      });

      undoBtn.addEventListener('click', () => {
        galleryRemovals.delete(src);
        wrapper.classList.remove('removed');
        label.classList.remove('removed-label');
        removeBtn.classList.remove('hidden');
        undoBtn.classList.add('hidden');
      });

      wrapper.appendChild(removeBtn);
      wrapper.appendChild(img);
      wrapper.appendChild(label);
      wrapper.appendChild(undoBtn);
      container.appendChild(wrapper);
    }
  }

  // ── Hero file picker preview ──────────────────────────────────────────────
  document.getElementById('f-hero').addEventListener('change', function () {
    const preview = document.getElementById('hero-preview');
    if (!this.files[0]) return;
    const img = document.createElement('img');
    img.src = URL.createObjectURL(this.files[0]);
    img.style.cssText = 'height:80px;width:80px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);';
    preview.innerHTML = '';
    preview.appendChild(img);
  });

  // ── Gallery new-file picker preview ──────────────────────────────────────
  document.getElementById('f-gallery').addEventListener('change', function () {
    const hint = document.getElementById('gallery-hint');
    hint.textContent = this.files.length > 0
      ? `${this.files.length} new file${this.files.length > 1 ? 's' : ''} selected — will be added to gallery on save`
      : '';
  });

  // ── Replace-all checkbox ──────────────────────────────────────────────────
  document.getElementById('f-replace-all-gallery').addEventListener('change', function () {
    const preview = document.getElementById('gallery-preview');
    if (this.checked) {
      // Mark all existing for removal
      preview.querySelectorAll('.gallery-thumb').forEach(wrapper => {
        const src = wrapper.dataset.path;
        if (src) {
          galleryRemovals.add(src);
          wrapper.classList.add('removed');
          wrapper.querySelector('.thumb-label').classList.add('removed-label');
          wrapper.querySelector('.remove-btn').classList.add('hidden');
          const undo = wrapper.querySelector('.undo-btn');
          if (undo) undo.classList.remove('hidden');
        }
      });
    } else {
      // Undo all removals
      galleryRemovals = new Set();
      preview.querySelectorAll('.gallery-thumb').forEach(wrapper => {
        wrapper.classList.remove('removed');
        wrapper.querySelector('.thumb-label').classList.remove('removed-label');
        wrapper.querySelector('.remove-btn').classList.remove('hidden');
        const undo = wrapper.querySelector('.undo-btn');
        if (undo) undo.classList.add('hidden');
      });
    }
  });

  // ── Load properties ───────────────────────────────────────────────────────
  let allProperties = [];

  async function loadProperties() {
    const res = await fetch('/api/properties');
    allProperties = await res.json();

    const tbody = document.getElementById('prop-tbody');
    tbody.innerHTML = '';
    if (allProperties.length === 0) {
      tbody.innerHTML = '<tr><td colspan="3" style="color:var(--text-soft);font-style:italic;">No properties yet.</td></tr>';
      return;
    }
    for (const p of allProperties) {
      const tr = document.createElement('tr');
      tr.dataset.propSlug = p.slug;
      const td = document.createElement('td');
      td.style.cssText = 'display:flex;gap:0.4rem;padding:0.5rem 1rem;';
      td.innerHTML = `
        <button class="btn btn-ghost btn-sm" data-edit-prop="${p.slug}">Edit</button>
        <button class="btn btn-danger btn-sm" data-delete-prop="${p.slug}" data-address="${p.address.replace(/"/g,'&quot;')}">Delete</button>
      `;
      tr.innerHTML = `
        <td>${p.address}</td>
        <td style="font-size:0.8rem;color:var(--text-soft);">${p.slug}</td>
      `;
      tr.appendChild(td);
      tbody.appendChild(tr);
    }

    // Populate property select in event form
    const sel = document.getElementById('f-property');
    const current = sel.value;
    sel.innerHTML = '<option value="">— select a property —</option>';
    for (const p of allProperties) {
      const opt = document.createElement('option');
      opt.value = p.slug;
      opt.textContent = p.address;
      if (p.slug === current) opt.selected = true;
      sel.appendChild(opt);
    }
  }

  // ── Open property form (shared by add and edit) ───────────────────────────
  function openPropForm(data) {
    document.getElementById('prop-form-title').textContent = data ? 'Edit property' : 'Add property';
    document.getElementById('prop-form').reset();
    document.getElementById('prop-slug-original').value = data ? (data.slug || '') : '';
    document.getElementById('f-hero-existing').value = data ? (data.hero || '') : '';
    document.getElementById('f-gallery-existing').value = data ? JSON.stringify(Array.isArray(data.gallery) ? data.gallery : []) : '[]';
    document.getElementById('f-replace-all-gallery').checked = false;
    document.getElementById('gallery-hint').textContent = '';

    if (data) {
      document.getElementById('f-address').value = data.address || '';
      document.getElementById('f-price').value = data.price || '';
      document.getElementById('f-sqft').value = data.sqft || '';
      document.getElementById('f-beds').value = data.beds || '';
      document.getElementById('f-baths').value = data.baths || '';
      document.getElementById('f-desc').value = data.description || '';

      // Hero preview
      const heroPreview = document.getElementById('hero-preview');
      if (data.hero) {
        const fname = data.hero.split('/').pop();
        heroPreview.innerHTML = '';
        const img = document.createElement('img');
        img.src = data.hero;
        img.title = fname;
        img.style.cssText = 'height:80px;width:80px;object-fit:cover;border-radius:6px;border:1.5px solid var(--border);';
        img.onerror = () => { img.alt = fname; img.style.background = '#eee'; };
        const note = document.createElement('span');
        note.style.cssText = 'display:block;font-size:0.7rem;color:var(--text-soft);margin-top:2px;';
        note.textContent = `${fname} — upload a new file to replace`;
        const wrap = document.createElement('div');
        wrap.appendChild(img);
        wrap.appendChild(note);
        heroPreview.appendChild(wrap);
      } else {
        document.getElementById('hero-preview').innerHTML = '';
      }

      // Gallery preview with per-image remove buttons
      buildGalleryPreview(Array.isArray(data.gallery) ? data.gallery : [], data.slug);
    } else {
      document.getElementById('hero-preview').innerHTML = '';
      document.getElementById('gallery-preview').innerHTML = '';
      galleryRemovals = new Set();
    }

    document.getElementById('prop-form-wrap').classList.remove('hidden');
    document.getElementById('f-address').focus();
  }

  document.getElementById('btn-add-property').addEventListener('click', () => openPropForm(null));
  document.getElementById('btn-cancel-prop').addEventListener('click', () => {
    document.getElementById('prop-form-wrap').classList.add('hidden');
  });

  document.addEventListener('click', async e => {
    const slug = e.target.dataset.editProp;
    if (!slug) return;
    const res = await fetch('/api/property/' + slug);
    if (!res.ok) return;
    openPropForm(await res.json());
  });

  // ── Property form submit ──────────────────────────────────────────────────
  document.getElementById('prop-form').addEventListener('submit', async e => {
    e.preventDefault();
    const statusEl = document.getElementById('prop-status');
    showStatus(statusEl, 'Saving…', 'loading');

    try {
      const address = document.getElementById('f-address').value.trim();
      const slug = document.getElementById('prop-slug-original').value || toSlug(address);

      // Hero
      let hero = null;
      const heroFile = document.getElementById('f-hero').files[0];
      if (heroFile) {
        showStatus(statusEl, 'Uploading hero image…', 'loading');
        hero = await uploadFile(slug, heroFile);
      } else {
        hero = document.getElementById('f-hero-existing').value || null;
      }

      // Gallery: start from existing, apply removals, append new uploads
      const replaceAll = document.getElementById('f-replace-all-gallery').checked;
      let existingGallery = [];
      if (!replaceAll) {
        try { existingGallery = JSON.parse(document.getElementById('f-gallery-existing').value || '[]'); } catch {}
        // Remove items marked for deletion
        existingGallery = existingGallery.filter(p => !galleryRemovals.has(p));
      }

      const newUploads = [];
      for (const file of document.getElementById('f-gallery').files) {
        showStatus(statusEl, 'Uploading gallery…', 'loading');
        newUploads.push(await uploadFile(slug, file));
      }

      // De-duplicate: existing (minus removed) + new uploads
      const gallery = [...new Set([...existingGallery, ...newUploads])];

      const payload = {
        slug,
        address,
        price: parseFloat(document.getElementById('f-price').value),
        sqft: parseFloat(document.getElementById('f-sqft').value),
        beds: parseFloat(document.getElementById('f-beds').value),
        baths: parseFloat(document.getElementById('f-baths').value),
        description: document.getElementById('f-desc').value.trim(),
        ...(hero ? { hero } : {}),
        ...(gallery.length > 0 ? { gallery } : {}),
      };

      showStatus(statusEl, 'Saving to GitHub…', 'loading');
      const saveRes = await fetch('/api/property', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const saveJson = await saveRes.json();
      if (!saveJson.ok) throw new Error(saveJson.error || 'Save failed');

      // Delete removed images from disk and GitHub
      for (const imgPath of galleryRemovals) {
        // imgPath is like /uploads/slug/file.jpg — convert to repoPath
        const repoPath = 'public' + imgPath;
        try {
          await fetch('/api/image', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ repoPath }),
          });
        } catch (err) {
          console.warn('Failed to delete image', repoPath, err);
        }
      }
      galleryRemovals = new Set();

      showStatus(statusEl, saveJson.github ? '✓ Saved and committed to GitHub' : '✓ Saved locally (no GitHub token)', 'ok');
      document.getElementById('prop-form-wrap').classList.add('hidden');
      await loadProperties();
    } catch (err) {
      showStatus(statusEl, '✗ ' + err.message, 'err');
    }
  });

  // ── Load events ───────────────────────────────────────────────────────────
  let allEvents = [];

  async function loadEvents() {
    const res = await fetch('/api/events');
    allEvents = await res.json();

    const tbody = document.getElementById('event-tbody');
    tbody.innerHTML = '';
    if (allEvents.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-soft);font-style:italic;">No events yet.</td></tr>';
      return;
    }
    for (const ev of allEvents) {
      const prop = allProperties.find(p => p.slug === ev.property);
      const address = prop ? prop.address : ev.property;
      const time = ev.start && ev.end ? `${ev.start} – ${ev.end}` : '';
      const tr = document.createElement('tr');
      tr.dataset.eventId = ev.id;

      const td = document.createElement('td');
      td.style.cssText = 'display:flex;gap:0.4rem;padding:0.5rem 1rem;';
      td.innerHTML = `
        <button class="btn btn-ghost btn-sm btn-icon" title="Duplicate for a new date" data-dupe-event="${ev.id}">+</button>
        <button class="btn btn-ghost btn-sm" data-edit-event="${ev.id}">Edit</button>
        <button class="btn btn-danger btn-sm" data-delete-event="${ev.id}" data-address="${address.replace(/"/g,'&quot;')}" data-date="${ev.date || ''}">Delete</button>
      `;
      tr.innerHTML = `
        <td>${address}</td>
        <td>${ev.date || ''}</td>
        <td style="font-size:0.85rem;">${time}</td>
      `;
      tr.appendChild(td);
      tbody.appendChild(tr);
    }
  }

  // ── Open event form (shared) ──────────────────────────────────────────────
  function openEventForm({ id, property, date, start, end, notes, isNew }) {
    document.getElementById('event-form-title').textContent = isNew ? 'Add event' : 'Edit event';
    document.getElementById('event-id-original').value = isNew ? '' : (id || '');
    document.getElementById('f-property').value = property || '';
    document.getElementById('f-date').value = date || '';
    document.getElementById('f-start').value = start || '';
    document.getElementById('f-end').value = end || '';
    document.getElementById('f-notes').value = notes || '';
    document.getElementById('event-form-wrap').classList.remove('hidden');
    document.getElementById('event-form-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
    document.getElementById('f-date').focus();
  }

  document.getElementById('btn-add-event').addEventListener('click', () => {
    openEventForm({ isNew: true });
  });

  document.getElementById('btn-cancel-event').addEventListener('click', () => {
    document.getElementById('event-form-wrap').classList.add('hidden');
  });

  // Edit, duplicate, and delete all wired through one delegated handler
  document.addEventListener('click', async e => {
    // ── Duplicate event ───────────────────────────────────────────────────
    const dupeId = e.target.dataset.dupeEvent;
    if (dupeId) {
      const res = await fetch('/api/event/' + dupeId);
      if (!res.ok) return;
      const d = await res.json();
      // Switch to Events tab if not already there
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.querySelector('[data-tab="events"]').classList.add('active');
      document.getElementById('panel-events').classList.add('active');
      openEventForm({ property: d.property, start: d.start, end: d.end, notes: d.notes, isNew: true });
      return;
    }

    // ── Edit event ────────────────────────────────────────────────────────
    const editId = e.target.dataset.editEvent;
    if (editId) {
      const res = await fetch('/api/event/' + editId);
      if (!res.ok) return;
      const d = await res.json();
      openEventForm({ id: editId, property: d.property, date: d.date, start: d.start, end: d.end, notes: d.notes, isNew: false });
      return;
    }

    // ── Delete event ──────────────────────────────────────────────────────
    const deleteEventId = e.target.dataset.deleteEvent;
    if (deleteEventId) {
      const address = e.target.dataset.address;
      const date = e.target.dataset.date;
      if (!confirm(`Delete open house at ${address} on ${date}?\n\nThis cannot be undone.`)) return;
      try {
        const res = await fetch('/api/event/' + deleteEventId, { method: 'DELETE' });
        const json = await res.json();
        if (!json.ok) throw new Error(json.error || 'Delete failed');
        document.querySelector(`tr[data-event-id="${deleteEventId}"]`)?.remove();
        allEvents = allEvents.filter(ev => ev.id !== deleteEventId);
        if (!document.getElementById('event-tbody').querySelector('tr[data-event-id]')) {
          document.getElementById('event-tbody').innerHTML =
            '<tr><td colspan="4" style="color:var(--text-soft);font-style:italic;">No events yet.</td></tr>';
        }
      } catch (err) { alert('Error: ' + err.message); }
      return;
    }

    // ── Delete property ───────────────────────────────────────────────────
    const deletePropSlug = e.target.dataset.deleteProp;
    if (deletePropSlug) {
      const address = e.target.dataset.address;
      const linked = allEvents.filter(ev => ev.property === deletePropSlug);
      if (linked.length > 0) {
        alert(`This property has ${linked.length} open house event${linked.length > 1 ? 's' : ''} referencing it. Delete those first.`);
        return;
      }
      if (!confirm(`Delete property "${address}"?\n\nThis cannot be undone.`)) return;
      try {
        const res = await fetch('/api/property/' + deletePropSlug, { method: 'DELETE' });
        const json = await res.json();
        if (res.status === 409) { alert(json.error); return; }
        if (!json.ok) throw new Error(json.error || 'Delete failed');
        document.querySelector(`tr[data-prop-slug="${deletePropSlug}"]`)?.remove();
        allProperties = allProperties.filter(p => p.slug !== deletePropSlug);
        if (!document.getElementById('prop-tbody').querySelector('tr[data-prop-slug]')) {
          document.getElementById('prop-tbody').innerHTML =
            '<tr><td colspan="3" style="color:var(--text-soft);font-style:italic;">No properties yet.</td></tr>';
        }
        document.querySelector(`#f-property option[value="${deletePropSlug}"]`)?.remove();
      } catch (err) { alert('Error: ' + err.message); }
      return;
    }
  });

  // ── Event form submit ─────────────────────────────────────────────────────
  document.getElementById('event-form').addEventListener('submit', async e => {
    e.preventDefault();
    const statusEl = document.getElementById('event-status');
    showStatus(statusEl, 'Saving…', 'loading');
    try {
      const originalId = document.getElementById('event-id-original').value;
      const payload = {
        property: document.getElementById('f-property').value,
        date: document.getElementById('f-date').value,
        start: document.getElementById('f-start').value,
        end: document.getElementById('f-end').value,
        notes: document.getElementById('f-notes').value.trim(),
        ...(originalId ? { originalId } : {}),
      };
      const res = await fetch('/api/event', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || 'Save failed');
      showStatus(statusEl, json.github ? '✓ Saved and committed to GitHub' : '✓ Saved locally (no GitHub token)', 'ok');
      document.getElementById('event-form-wrap').classList.add('hidden');
      await loadEvents();
    } catch (err) {
      showStatus(statusEl, '✗ ' + err.message, 'err');
    }
  });

  // ── Sync all ──────────────────────────────────────────────────────────────
  document.getElementById('btn-sync-all').addEventListener('click', async () => {
    const btn = document.getElementById('btn-sync-all');
    const statusEl = document.getElementById('sync-status');
    btn.disabled = true;
    btn.textContent = 'Syncing…';
    statusEl.textContent = 'Pushing all files to GitHub…';
    statusEl.className = 'status loading';
    statusEl.classList.remove('hidden');
    try {
      const res = await fetch('/api/sync-all', { method: 'POST' });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Sync failed');
      if (json.failed === 0) {
        statusEl.textContent = `✓ ${json.synced} file${json.synced !== 1 ? 's' : ''} synced to GitHub`;
        statusEl.className = 'status ok';
      } else {
        statusEl.textContent = `⚠ ${json.synced} synced, ${json.failed} failed — check terminal`;
        statusEl.className = 'status err';
      }
    } catch (err) {
      statusEl.textContent = '✗ ' + err.message;
      statusEl.className = 'status err';
    } finally {
      btn.disabled = false;
      btn.textContent = '↑ Sync all to GitHub';
      setTimeout(() => statusEl.classList.add('hidden'), 8000);
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  (async () => {
    await loadProperties();
    await loadEvents();
  })();
</script>

</body>
</html>
